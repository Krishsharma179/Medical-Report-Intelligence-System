<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CAD Prediction</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:center
    }
    .container{
      background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
      border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,.1);
      padding:40px;max-width:500px;width:100%;border:1px solid rgba(255,255,255,.2)
    }
    h2{text-align:center;color:#333;margin-bottom:30px;font-size:28px;font-weight:600}
    .form-group{margin-bottom:20px}
    label{display:block;margin-bottom:8px;color:#555;font-weight:500;font-size:14px}
    input[type="number"], select{
      width:100%;padding:12px 16px;border:2px solid #e1e5e9;border-radius:10px;
      font-size:16px;transition:all .3s ease;background:#f8f9fa
    }
    input[type="number"]:focus, select:focus{
      outline:none;border-color:#667eea;background:#fff;box-shadow:0 0 0 3px rgba(102,126,234,.1);transform:translateY(-1px)
    }
    select{cursor:pointer}
    button{
      width:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color:white;padding:15px;border:none;border-radius:10px;font-size:18px;font-weight:600;
      cursor:pointer;transition:all .3s ease;margin-top:20px
    }
    button:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(102,126,234,.3)}
    button:active{transform:translateY(0)}
    .result{
      margin-top:30px;padding:20px;background:rgba(102,126,234,.1);
      border-radius:10px;text-align:center;border-left:4px solid #667eea
    }
    .result h3{color:#333;font-size:18px}
    .required{color:#e74c3c}

    /* Simplify output box */
    #simplifyBox{
      display:none;
      margin-top:12px;
      padding:16px;
      background:#ffffff;
      border:2px dashed #cbd5e1;
      border-radius:10px;
      min-height:80px;
      color:#374151;
      text-align:left;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>CAD Prediction</h2>

    <form action="/predict_cad" method="POST">
      <div class="form-group">
        <label for="age">Age:</label>
        <input type="number" name="age" id="age" required step="1" placeholder="Enter age (e.g. 40)">
      </div>
      <div class="form-group">
        <label for="sex">Gender:</label>
        <input type="number" name="sex" id="sex" required step="1" placeholder="Enter sex (0=female, 1=male)">
      </div>
      <div class="form-group">
        <label for="chest_pain_type">Chest Pain Type:</label>
        <input type="number" name="chest_pain_type" id="chest_pain_type" required step="1" placeholder="Chest pain type (0-4)">
      </div>
      <div class="form-group">
        <label for="resting_bp_s">Resting BP Systolic:</label>
        <input type="number" name="resting_bp_s" id="resting_bp_s" required step="1" placeholder="Resting BP Systolic (e.g. 140)">
      </div>
      <div class="form-group">
        <label for="cholesterol">Cholesterol:</label>
        <input type="number" name="cholesterol" id="cholesterol" required step="1" placeholder="Cholesterol (e.g. 289)">
      </div>
      <div class="form-group">
        <label for="fasting_blood_sugar">Fasting Blood Sugar:</label>
        <input type="number" name="fasting_blood_sugar" id="fasting_blood_sugar" required step="1" placeholder="Fasting Blood Sugar (0 or 1)">
      </div>
      <div class="form-group">
        <label for="resting_ecg">Resting ECG:</label>
        <input type="number" name="resting_ecg" id="resting_ecg" required step="1" placeholder="Resting ECG (0-2)">
      </div>
      <div class="form-group">
        <label for="max_heart_rate">Max Heart Rate:</label>
        <input type="number" name="max_heart_rate" id="max_heart_rate" required step="1" placeholder="Max Heart Rate (e.g. 172)">
      </div>
      <div class="form-group">
        <label for="exercise_angina">Exercise Angina:</label>
        <input type="number" name="exercise_angina" id="exercise_angina" required step="1" placeholder="Exercise Angina (0 or 1)">
      </div>
      <div class="form-group">
        <label for="oldpeak">Oldpeak:</label>
        <input type="number" name="oldpeak" id="oldpeak" required step="any" placeholder="Oldpeak (e.g. 0.0)">
      </div>
      <div class="form-group">
        <label for="ST_slope">ST Slope:</label>
        <input type="number" name="ST_slope" id="ST_slope" required step="1" placeholder="ST Slope (0-2)">
      </div>

      <button type="submit">Predict</button>
    </form>

    <!-- Probability box -->
    <div class="result" id="probBox">
      <h3><p>There is a probability of {{ result }} % of {{ index }}</p></h3>
    </div>

    <!-- Simplify button and output box -->
    <button id="simplifyBtn" type="button" onclick="showSimplify()">Simplify</button>
    <div id="simplifyBox">{{ response }}</div>
  </div>

  <script>
    function showSimplify(){
      const box = document.getElementById('simplifyBox');
      box.style.display = 'block';
    }
  </script>
</body>
</html>
